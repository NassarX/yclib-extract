<link rel="stylesheet" crossorigin="" href="https://bookface-static.ycombinator.com/vite/assets/YouTube-pzuUIErF.css" media="screen" /><script src="https://bookface-static.ycombinator.com/assets/blog-54db898b518e809d1aaeaacf7e7cc20fa35375fb3348fc2b56cea781f5cdfa55.js" defer="defer"></script><link href="https://www.ycombinator.com/library/7n-live-office-hours-with-yc-s-kevin-hale-and-dalton-caldwell-2017" rel="canonical" /><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.13.0/css/all.min.css" rel="stylesheet" /></head><body class="ycdc2 articles show"><div data-page="{&quot;component&quot;:&quot;ArticlesLibraryShowPage&quot;,&quot;props&quot;:{&quot;article&quot;:{&quot;id&quot;:483,&quot;slug&quot;:&quot;7n-live-office-hours-with-yc-s-kevin-hale-and-dalton-caldwell-2017&quot;,&quot;title&quot;:&quot;Live office hours with YC&#39;s Kevin Hale and Dalton Caldwell (2017)&quot;,&quot;content&quot;:&quot;Kevin Hale, Partner at Y Combinator, and Dalton Caldwell, Director of Admissions and Partner at Y Combinator, hold\noffice hours with three startups: HubHaus, Lambda Intelligence, and Commaful.\n&quot;,&quot;ranking&quot;:271,&quot;root_id&quot;:176,&quot;author&quot;:&quot;Kevin Hale, Dalton Caldwell&quot;,&quot;authors&quot;:[{&quot;name&quot;:&quot;Dalton Caldwell&quot;,&quot;url&quot;:&quot;/people/&quot;}],&quot;description&quot;:&quot;YC&#39;s Kevin Hale and Dalton Caldwell hold office hours with three startups: HubHaus, Lambda Intelligence, and Commaful.&quot;,&quot;sus_curriculum&quot;:false,&quot;link&quot;:&quot;https://www.youtube.com/watch?v=8Qc8ipjzatY&quot;,&quot;transcript&quot;:&quot;Dalton Caldwell: Hey, how&#39;s it going? We&#39;re going to get started. Yeah, I&#39;m Dalton. I&#39;m a partner at Y Combinator, and we&#39;re going to be doing office hours today.\n\nKevin Hale: Yeah, yeah. Uh, couple things to know. I know that a couple live office hours happened beforehand. We&#39;re going to try to spend a little bit of time even after these to talk with the different companies. Twenty minutes for office hours is not a normal time period that we&#39;ll do stuff, so we&#39;re going to try to do it as fast as possible. Apologies in advance—we might interrupt you just because we know how short the time is to try to get as much information out of you as we have to communicate as well.\n\nDalton Caldwell: All right, thanks a lot. I think, yeah, how you doing?\n\nKevin Hale: Good. Kevin, how&#39;s it going? And then I think you&#39;ll need to use the mic, right?\n\nAudience Member: Yeah, the handle mic.\n\nKevin Hale: Yep. So just very quickly introduce each of yourselves—like your name, your role, the company, and then name of the company and what you guys are doing.\n\nShudy: Yep. I&#39;m Shudy. Um, we&#39;re with HubHouse, and this is Carrie. I&#39;m the CTO.\n\nCarrie: I&#39;m the CEO.\n\nShudy: And then what does HubHouse do? Um, so HubHouse does co-living. We provide co-living spaces for professionals. So if you&#39;re new to the area, you&#39;ve just gotten here, um, and you want to rent a room out in a house with a curated community and you want it to be set up, you can move into one of our rooms.\n\nKevin Hale: And then what does co-living exactly mean?\n\nCarrie: Um, co-living means living with a group of people. So basically shared housing.\n\nKevin Hale: How many people?\n\nShudy: Um, our houses are five to ten people. Some co-living spaces can range up to thirty, but ours are five to ten.\n\nKevin Hale: And then is it characteristic that you&#39;re sharing a bathroom with a bunch of other people also?\n\nShudy: Not necessarily. Some are, some don&#39;t.\n\nKevin Hale: Gotcha. And then how are things going for you guys so far?\n\nCarrie: Um, pretty well. So we launched eighteen months ago. Um, we are now at 220 tenancies across over a dozen cities in the Bay Area and in Los Angeles.\n\nKevin Hale: What&#39;s the occupancy rate for those?\n\nShudy: Um, we currently have an occupancy rate of 94%. Um, most of the vacancy rate comes from our launch vacancy, so our vacancy rate, not including the first two weeks and the last two weeks, is about 2%.\n\nKevin Hale: So when you say 94%, like how many people does that mean? Like in 220 properties?\n\nShudy: Oh, so sorry. So 220 tenants total—tenants.\n\nKevin Hale: Gotcha. 220. Uh, yeah, that that includes—so uh, that doesn&#39;t. So we have more rooms than 220. We have about 230 rooms.\n\nKevin Hale: Yeah, 230 rooms. So in terms of the timeline, when did you first start? Like you said eighteen months ago, but what did that look like? The very first tenant, I guess?\n\nCarrie: Yeah, so first thing is we got a house, and I was actually—we both still live in our HubHouses, but I moved into our very first HubHouse. Um, and then we got a bunch of tenants. Um, the first few houses was very much so a learning process. We were trying to figure out what works, what doesn&#39;t, and try to create this backbone for our um for co-living spaces.\n\nShudy: Answer that question—it took about seven. It about I think it&#39;s seven houses in the first three months.\n\nKevin Hale: Okay. And so you guys take on the lease. What are the terms of the lease that you take out? Is it just a standard one-year lease, and then it goes month to month?\n\nCarrie: I see. Uh, yeah. So we do. We do one year to two-year leases for each of our houses, and we continue with one year to two leases.\n\nKevin Hale: Do you need any special permissions from the actual owner of the property to do this?\n\nCarrie: Mm-hmm. Yeah, so we are completely upfront with our owners. We let them know exactly what we&#39;re doing. Um, we sell it as a benefit. We act as a property adviser to the owners. Um, and we guarantee them rent every month even if the house is completely vacant.\n\nKevin Hale: And then what&#39;s the margins that you get currently?\n\nCarrie: Um, thirty to forty percent.\n\nKevin Hale: Forty percent. So let&#39;s just say let&#39;s take a typical property. You have like one house that has how many rooms on average?\n\nShudy: Um, six.\n\nKevin Hale: Six rooms. And then how much are you paying rent on that house?\n\nCarrie: So roughly 6,000.\n\nKevin Hale: 6,000. Okay. And then you guys will make 40% on top of that usually through renting out. Um, so if I&#39;m a property owner, why is this a good deal? You said an adviser. I don&#39;t really know what that means. Like why am I like, \&quot;Wow, please have a bunch of people coming to my house,\&quot; and like maybe it&#39;s going to depreciate a lot?\n\nCarrie: Yeah. Um, so most of our property owners have pretty large properties which are hard to rent out. So we&#39;re able to quickly rent out a house which maybe rents for like 6,000 to 8,000, 9,000. Um, and instead of having to deal with a typical roommate situation where you have to deal with five, like six...\n\nKevin Hale: But the landlord doesn&#39;t care about that as long as they get paid, you know? Like, this has been going on a while. The landlord is like, \&quot;I don&#39;t care as long as the rent shows up. Whatever you guys are doing, not my problem.\&quot;\n\nShudy: Well, so at the end of the day, as a landlord, you want one check. You want to make sure your house is taken care of, and you want professional people living there, and you don&#39;t want to have to deal with it. Um, so we take care of all the hard stuff. If there are any property problems which come up, we advise them on what to do. But at the end of the day, all you&#39;re getting is one check, and you don&#39;t hear anything from us.\n\nKevin Hale: So what&#39;s the rate of growth? So how are things going right now? You said you&#39;re doing pretty well, but like, is revenue increasing monthly or weekly?\n\nCarrie: Yeah. So um, over the—so we just raised around—uh, and after we raised, we&#39;ve kind of scaled back, and we&#39;ve been growing out our team.\n\nKevin Hale: Why would you scale back?\n\nCarrie: Um, we wanted to hire a team, and we wanted to make sure our processes were going well. Um, we will—oh sorry, we were working about like eighty to 100-hour weeks each of us, and we were kind of reaching the limits of what we could do without a team.\n\nKevin Hale: So just to go back, so what the rate of growth right now?\n\nShudy: Um, about eight to ten percent.\n\nKevin Hale: Eight to ten percent a month? And we&#39;re growing—so before that we were doing about fifty. How fast are you adding on new properties? Is that pretty much your bottleneck, finding supply?\n\nCarrie: Um, right now our uh, our bottleneck is operations. So we want to make sure that each of our houses is launching smoothly and well. So that&#39;s that&#39;s what—so right now you don&#39;t have a playbook for launching.\n\nKevin Hale: How many properties do you have?\n\nCarrie: We have forty properties.\n\nKevin Hale: Forty properties. And you feel like you still don&#39;t? Why why do you feel like you don&#39;t have a playbook after forty?\n\nShudy: I mean, we we definitely we do have a playbook. So we do have a step-by-step process that we go through. Um, but we&#39;ve just gotten our team on, and we&#39;re building out our tech and training so that we&#39;re able to scale sustainably and provide a fantastic experience to each customer.\n\nKevin Hale: So when you say you want to build out a team to build tech and training, can you just dig into that a little bit? Like, what do you need the team to do?\n\nShudy: Um, so we we now have a team. So before—until December, I was the only full-time person working.\n\nKevin Hale: Okay.\n\nShudy: And uh, in December, Carrie came on full-time. Um, Carrie was working as a co-founder before that, but he came on full-time. And then we had one employee in December. Um, so the past few months, we hired on a property manager. We hired on a person to help out with partnerships. Um, and we want a second developer to basically help us build out the tech to automate a lot of these manual processes that we&#39;re doing, such as like responding to emails, responding to tenants um with property management inquiries that come in. We want a—there&#39;s ways to automate a lot of those steps.\n\nDalton Caldwell: We do look at ourselves like a marketplace, but it&#39;s not a true marketplace because we&#39;re not connecting the landlords with the tenants. And so we do have the supply and demand factors of it. Uh, we found that it tends to go back and forth between it. We—to me, I don&#39;t understand that. Uh, which part?\n\nShudy: It&#39;s it&#39;s two—it&#39;s two parts.\n\nDalton Caldwell: Yeah. So right, and you&#39;re connecting them together. So I don&#39;t—so the tenants never deal with the landlord specifically. Um, and so we&#39;re not connecting landlords with the tenants. We have to make the deal with the landlord themselves, right? But it&#39;s one ecosystem of supply, one ecosystem of demand, and you&#39;re bringing them together, regardless of how like the connections happen. It still thinks that still works that way.\n\nKevin Hale: What I&#39;m trying to figure out is how does this—how does this sort of when—and the thing is, like, do you feel like part of co-living is like this movement? Like, people are realizing like, \&quot;I want to work and there&#39;s a lot nicer if I can work with a bunch of other people,\&quot; but the places where I want to work—I take it you mostly are in the Bay Area, right?\n\nCarrie: Um, yeah. I mean, we&#39;re in the Bay Area and LA. Then it&#39;s like really expensive to get places. And so for the places where I&#39;m trying to get in there really quickly, I might not have enough capital to move in. So like, co-living is a way to like step into that.\n\nKevin Hale: So I&#39;m trying to think, is like, do you have a reliable source of supply for people where this—like, if let&#39;s say this is a really big trend that you&#39;re going to be able to onboard? And I&#39;m trying to figure out is like, at what point do you feel like you already add on new properties, and at what rate do you add on properties?\n\nShudy: So we&#39;re picking up approximately four to six houses a month.\n\nKevin Hale: Four to six a month. Yeah. Okay. And then you and then how long are they vacant before? Like, how long does it take to get a house up and going?\n\nCarrie: Um, so the time from when we sign a lease to the time the first person moves in is about two weeks. Um, the time from when uh, we launch the house when it&#39;s 100% full is another two weeks. So about a month before it&#39;s a completely up and running HubHouse.\n\nKevin Hale: About a month. So we&#39;ve seen a lot of people work on this idea, and it seems like you can get about as far as you have gotten, which is really great. Um, but to—because you actually have to take on the lease, and because you have hard costs, sometimes these can look much more like a real estate business than a tech business. And so I think what what I kind of want to get at is, are there ways that you can not hold the leases? Like, is there a way you can make this much more efficient from a capital basis? Because right now, this is basically a real estate business, right? And it sounds like there&#39;s some tech in there, but I haven&#39;t really gotten from you that tech is like the differentiating factor that will make—like, it sounds like it&#39;s a lot of operations work to sign leases and then get people in units, which is like pretty traditional residential um housing type business. So how are you thinking about um what what lets us get huge, right? Like, what what are your thoughts along those lines?\n\nShudy: So part of that—so there is a good deal of tech. Um, I do agree that it is not the key differentiating factor that we have. Um, some of it&#39;s different, and we automate a lot of the operations that are happening. And what those for like—uh, \&quot;Hey, the faucet&#39;s broken. Can someone fix it?\&quot; and you open a ticket. Is that what you mean? Like, can you tell me what that means?\n\nKevin Hale: So more along the lines of automatically finding houses to go and see uh using some different methods. There, automatically posting. And so we have a constant instream of uh probably about 100 tenants reaching out to us a day that&#39;s being automated by tech. Um, a lot of the inter-operations going between that is operated by tech. Um, none of that&#39;s very—some of it&#39;s unique, some of it&#39;s not so much unique. I&#39;d say the bigger differentiating factor uh which we haven&#39;t mentioned yet is the community fact that we build into it, which is a lot of people come because it&#39;s cheaper and because it&#39;s a place that they need quickly. Um, but we have a very strong community element and create an infrastructure in each house so people are actually forming these really strong bonds.\n\nKevin Hale: How do you make that happen?\n\nCarrie: Um, so part of that is we set up uh monthly dinners and we give them format of these are things you should go over. And we throw events every month for the entire community. And so we&#39;re actually connecting these people. And for that reason, we&#39;ve had a continual growth. Uh, while we started with month-to-month leases, we&#39;ve moved up. Uh, since then, our average day length has been a continual process upwards um since the beginning and still going.\n\nKevin Hale: Quite honestly, I feel like this really comes down the cost. Like, people want to move into cities in places where it&#39;s highly desirable, but property is like not abundant, and they&#39;re trying to figure out how can I get to this in a cost-affordable way. So co-living goes a way to sort of make it happen. You can advertise all these community stuff. It&#39;s stuff that you can sell to people, but it&#39;s no different from an apartment, a condo complex, is like, \&quot;Hey, we have these community stuff. We have a pool room. We have these like monthly dinners or barbecues.\&quot; Like, it doesn&#39;t sound any different. Because no one says like, \&quot;We don&#39;t have a community here. We don&#39;t do anything nice for the people. Make sure there&#39;s a bunch of shitty people here living inside of it.\&quot; You don&#39;t sound any different from it. So all I can think is like, this is pretty much it&#39;s either a land grab. You have more great properties than anyone else. And then like, onboarding feels so simple and easy. Basically, it&#39;s like someone contacts you on average—how long before they&#39;re moved in?\n\nShudy: Um, is that a month? No. So it&#39;s uh I mean, it&#39;s it&#39;s as short as a week or two. Um, but I I think the difference is that the houses—access to rooms isn&#39;t easily accessible right now. Access to rooms in single family homes with curated communities, the only way you can get access to these is through Craigslist by setting it up yourself. So we&#39;re unlocking a whole new market, which the whole thing is, you build a brand that gets people to try—people. Audience are dead houses. Is that still a thing? Robitzki? Anybody? Dead houses. Anyone living a dead house?\n\nAudience Member: Yeah, okay, cool. Yeah, okay.\n\nKevin Hale: So clearly, there&#39;s there&#39;s people that want to do this. Um, and okay. So it sounds like we about five minutes left. So what what are the things you&#39;re thinking about that that can make this as constructive as possible? Because like, you know, just to summarize—sounds good. You&#39;re making money. Like, good job. What might be tough is, what&#39;s the move to make this huge? And let me give you some options. Sometimes people that are working on a startup idea decide to actually buy the properties because you can renovate them, and then it&#39;s then you actually own an asset, and it becomes almost again like a real estate business. And I&#39;ve seen that&#39;s kind of the WeWork model, right? Um, so I&#39;ve seen that happen. Uh, on the other hand, you could try to make this as asset light as possible, where maybe you&#39;re not taking the obligation of the leases, right? And then you can grow really fast, and somehow have a special deal the landlords where you can just like grow really fast. And then you&#39;re a true marketplace because you&#39;re not holding any of the liability that right now you&#39;re holding. Or you can again maybe you found the just right compromise between the two. Um, so this is sort of where I would think about from from the long-term perspective. Do you have thoughts around where you see this going in a year or two?\n\nCarrie: So the ladder is probably the direction we&#39;re going to go. The reason why we haven&#39;t is just because it hasn&#39;t really been a problem until now. Um, but in the future, as it does become more of a—\n\nKevin Hale: problem we do want to shift more of the liability to the property owners. Got it. And one quick question while we&#39;re on that—is there any insurance implications for this? Do you have to? What kind of insurance do you have to take out?\n\nCarrie: So we do have a pretty comprehensive insurance policy to cover our properties. Um, if our tenants do damage anything, up to like if the tenants burn down the house or something, they are covered. And then we are also asking our tenants to get renters insurance on top of that.\n\nKevin Hale: If your problem right now is like operations and you&#39;re recruiting, trying to find people, like what is your pitch to people to get people on board to say like, \&quot;Come and do this startup,\&quot; because it&#39;s not many people&#39;s dream to be like, \&quot;I&#39;m going to work on basically the new form of like apartment complexes or dorms, basically dorms for like millennials\&quot;?\n\nCarrie: I mean, so I think the biggest piece of our company is our community. So each of our houses is almost like a family-like environment, and people can really buy into that. I mean, I think a lot of people out here don&#39;t really have access to that. And around universities, sure, some people have access to things like frat houses, but most people out here move out here and are lonely and don&#39;t really know people. Um, so being able to offer the sense of community and the friendships that formed from within our community, um, is probably the biggest pitch that we make.\n\nKevin Hale: So you think that&#39;s the long-term defensibility? You think ultimately the community? I&#39;m just trying to make sure I understand. So you&#39;re saying like, \&quot;Look, we&#39;re going to have the best community and the best brand for community,\&quot; and that&#39;s what will attract people? Because again, with this kind of business, it&#39;s very easy for new entrants to come in. So if we use the example of Airbnb, anyone can make an Airbnb clone, but what they actually had was network effects. Where, just like eBay, it&#39;s hard to compete with eBay because they have the buyers and sellers. What&#39;s the equivalent here? Is it the community? Is that what you&#39;re saying?\n\nCarrie: So it is branding. Um, a lot of that—we do have a network effect because it&#39;s not just community in the houses. We connect all the houses to each other as well. So we do have a bit of a network effect there. I do think branding is the defensibility part. Um, the other key part that Shy mentioned to me in the past is most of the competitors can do one or two things well. So Campus was a previous company who did very something very similar, but they had very low margin on it, and they did the community aspect really well. People loved staying in them, but the operations was awful. Um, and then there&#39;s other companies that do the operations very, very well, but many people have come to us and said, \&quot;Everybody talks about community, but you&#39;re the only ones with it.\&quot; Um, and so we feel that what we have is different, but we are also good at operations. Um, and so that&#39;s the part that we are trying to scale and trying to hire for. Tech to turn it more and more into a tech business and to take all the lengthy processes that are taking operations—like we&#39;re hiring for more engineers right now—and making that as automated as possible so we can do less of the actual signing of the leases and the direct things there.\n\nKevin Hale: I think all the community stuff is good. It&#39;s tough for you to focus on. It&#39;ll prevent churn from happening, but for the conversion, my feeling is your bottleneck is probably supply. So whatever it is, you need to do to relieve yourself—like, what allows us to say, \&quot;We want to take on more properties\&quot;? Because really, what you have set up is like your liability is that first month&#39;s rent that you need to take on. That&#39;s like your capital liability. So if you can figure out like, \&quot;How can I turn around where I sign a house right, and I can turn around\&quot;—I think you also have to put a safety deposit, like a security deposit also. So it&#39;s almost two months&#39; worth of rent that you&#39;re taking on before you can have it covered back. And how long before you have that?\n\nCarrie: So it&#39;s about a month.\n\nKevin Hale: About a month? So it&#39;s going to be about two—no, it&#39;s going to be about four months before you cover both of the, before you cover two months&#39; worth of rent.\n\nCarrie: Well, we collect back security deposits from our tenants.\n\nKevin Hale: Ah, great. And then I think that—I think that&#39;s all it comes down to. Like, you need to figure out how to do all the community stuff up ahead of time, but that allows you to say like, \&quot;I want to take as many properties as possible,\&quot; and figure out how to jumpstart them and like, get people into the houses or homes very, very quickly without losing quality. And so the whole thing is like, \&quot;What is that exact playbook?\&quot; Like, you want to almost time yourself. It&#39;s like, \&quot;Okay, we leased out a property. How long does it take? What is our checklist that&#39;s very, very reliable for us to determine if it&#39;s viable or not?\&quot; Go in there, figure it out. And that&#39;s where part of the tech is going to be—seeing like, how much can we do online? And then the second part is going to be like, \&quot;We have someone down there who does a very quick assessment,\&quot; and you have a team that quickly turns around the place, takes the pictures, puts the listing up there, and gets it out to people. So that&#39;s like the first supply. And then your demand is just like being very proactive on getting the demand. So, like, get people, tenants, like you get testimonials, you send it out to whatever universities or wherever people are going to be looking for housing. And so make sure that they all think like, \&quot;Hub House is the first place I go to consider moving to a new city.\&quot; It&#39;s like, \&quot;I want Hub House to be there because I know that&#39;s a good—even if it&#39;s transitory, it&#39;s like I want to go there. I&#39;ll be there for maybe one to two months, and then I&#39;ll maybe transition into something better. Or some percentage of them say like, &#39;I just want to stay here because this is the kind of community I want to be with.&#39;\&quot;\n\nCarrie: I imagine most people are going to eventually graduate. Nobody wants to live in a co-living forever. U, some people might, but that&#39;s actually—\n\nKevin Hale: I think that&#39;s the thing I most worry about. Co-living, kind of like co-working spaces—the thing I always get nervous about in terms of brand erosion is that it&#39;s not an easy way to like churn people out. And the thing is, in a place where you go—where great people will graduate—what ends up happening is like it slowly starts rotting with people who, like, can&#39;t leave. It&#39;s like, \&quot;I don&#39;t have anyone else that loves me and never wants to live with me.\&quot; And it looks like online forums. It looks like co-working. It&#39;s just like people don&#39;t want to be in those spaces anymore because it&#39;s like, \&quot;Oh, it&#39;s all filled up with people who like never left, and they start getting angry,\&quot; etc. etc. One of those places—but what you want to really pay attention to is like, \&quot;How do I figure that out? Like, how do I make sure that this day is fresh? How do I make sure that like people who might be creating friction will not like, like, poison the rest of the house?\&quot;\n\nCarrie: Yeah, to paraphrase, um, these kinds of businesses—churn kills you. And the founders never realize that they have high churn until like, you may be like, \&quot;Oh, we have really great churn. Everyone always says that.\&quot; But like, you don&#39;t have enough data yet. But over the long run, sometimes things can creep up on you. And if all of a sudden you start to have high churn, and then you&#39;re on the hook for all these leases—like, these can get tricky. This is a lot of the food delivery type startups. Like, there&#39;s a whole class of things that don&#39;t work. Um, and they&#39;re like, \&quot;We have positive margins and we have low churn and we have great\&quot;—like, they all say the same things. But if you really dig into them, the secret hiding in their numbers that the founders don&#39;t want to admit to themselves is that actually churn can get you. And if you have hard costs—like warehouses, not for you, but for other people—if you have all these hard costs, um, and then you have like some down months, like you have to pay your rent every month. You can&#39;t get out of it. Like, if community is everything—yeah—then the tools you want to think about also are like the equivalent of what you might see in like moderation tools. Like, what, like, we have to build all this stuff to work on communities at scale? How does that work for like within homes and houses? Like, how—who do we have to empower within our community to make them sort of work and carry things onward? Um, lots of great real-life communities that have grown to be really big—they have to be really careful of like how they sort of set that up. So there&#39;s going to be this delicate balance between that you&#39;re actually going through right now—between like, \&quot;I need to achieve growth and revenue,\&quot; but also need to make sure the community is like taken care of. And so like, the moment I think you choose this way above this, then there&#39;s a sacrifice. But the thing is, you have to figure out like, \&quot;How do I get these to work in tandem in a way that doesn&#39;t break everything?\&quot; And hopefully this—this trend—and this is the other thing I always worry about is that this is a trend that just might break over time. Like, just people start—cities and government start building enough housing that basically people are able to find cheap housing on their own, they just live by themselves. From your perspective, what do you think the biggest risk is? Like, what do you? Is it—is it you need to hire operations people, you know what I&#39;m saying? Like, what do you think is the—like, if you had in the future, let&#39;s say it didn&#39;t work, and you&#39;re like, \&quot;Man, it was this reason\&quot;—if you had to guess, what do you think that is?\n\nCarrie: Um, we definitely do run a risk that if the market crashes, rents could just crash. Um, and we are locked into one to two-year leases, which is why we try to restrict it to one to two-year leases.\n\nKevin Hale: Yeah, um, I think that&#39;s a big risk. Can you think of others?\n\nCarrie: Yeah, um, yeah. I think I would agree that that&#39;s the number one risk. Uh, the other report is uh, not being able to be able to continue to scale because operations costs are not able to be automated in a valid way.\n\nKevin Hale: Yeah, and like for your own edification, I think a good thing to do would be to amortize all of your costs for operations and your time when you&#39;re calculating your margins. This is a classic thing people do—is like, \&quot;We do food delivery, and we have positive margins.\&quot; And it&#39;s just that they sell you know a burrito for ten bucks, and it costs them seven bucks to make it. But if you include delivery cost, if you include support cost, if you include returns, if you—like, if you actually bake in all this stuff, they are definitely not positive margin. And so I think in your case, um, just for your own notification, try to bake in some of these costs you have from an operational basis—your eighty hours that you guys are on—you got to put those into your margin calculation, you know? And that&#39;ll just help you know that you&#39;re actually building a great business versus you&#39;re just like leaving out some of the cost in your margin calculation.\n\nCarrie: Yeah, all right, we are out of time. Thank you so much, Shy. Appreciate it.\n\nShy: Thank you, thank you.\n\nDalton Caldwell: Thanks. Hi, hi, how&#39;s it going?\n\nAudience Member: Good, how are you guys?\n\nDalton Caldwell: Good. Okay, so what&#39;s your name?\n\nAudience Member: My name is Ash.\n\nDalton Caldwell: Hi, hi, Ash. Shay, hi. How&#39;s it going?\n\nShay: Hi, Shay. Good. Nice to meet you. Um, so we are Lambda Intelligence. I&#39;m CEO, and um, we&#39;ve built an API that allows developers to extract product information out of digitized receipts. So image receipt images and turns out there&#39;s huge volumes of data that&#39;s locked up in these.\n\nDalton Caldwell: Before you go into your backstory, can you be really clear—so who&#39;s the customer?\n\nShay: So we&#39;re actually selling to um, mobile app developers. So we&#39;ve got a mobile app developer who&#39;s um, who we just signed a contract with. Um, they&#39;re our first customer. But um, they&#39;re paying us two thousand bucks a month uh, right now for for processing um, basically product information out of receipt images.\n\nDalton Caldwell: Okay, so you guys offer an API to be able to take receipts and just like give structured information back?\n\nShay: Exactly. And then can you give me one more use case—like, why is this developer need this?\n\nDalton Caldwell: So the core piece here is not just the OCR, but it&#39;s also mapping the shortened product descriptions and the prices to the actual product—the full product name, description, brand, all of that type of structured information.\n\nShay: So but what does their app do? So like, why would I want to download their app? What do I get to do with it?\n\nDalton Caldwell: So they&#39;re a loyalty card vendor, yeah? So they&#39;re using this to better their app and better target themselves to their customers. So that&#39;s why they need this product information.\n\nShay: So I always get nervous with API companies because basically, APIs is like the bottom rung of infrastructure for like software projects. And so like, they tend to want to be like commodities ultimately in the end. And so the great API companies are going to be like, \&quot;Okay, if we&#39;re going to figure out how to do this as cheaply as possible because this is going to eventually become a commodity, then like, which ones are going after markets that are super, super huge?\&quot; So that&#39;s why I&#39;m very interested in who the customers you&#39;re like—mobile app developers that need to read receipts. How many of those are there in the ecosystem?\n\nShay: That&#39;s actually a good question. Uh, there are only two hundred mobile app developers. But the second side of the business that we focusing on is that brands are really interested—deeply interested in this type of data. So we&#39;re in talks with one of the top brands with Kraft, and they&#39;ve uh, expressed interest in getting this type of data from us.\n\nDalton Caldwell: So okay, so your real customer is CPG company?\n\nShay: Exact.\n\nDalton Caldwell: But the thing you need to—okay, so you have like a multi-step process, you&#39;re like—are you giving the API away for free?\n\nShay: No.\n\nDalton Caldwell: Why? Why not just give it for free if the real customers of these giant CPG companies? Why not just be like, \&quot;Mobile, we have a really great like OCR receipt reading thing, have at it,\&quot; and then because you have the best data collecting all that information, then you&#39;re able to actually close these Enterprise?\n\nShay: That&#39;s kind of our plan going forward. Um, right now we&#39;re able to get some revenue off of um, just providing this um OCR API to our our mobile app vendors, and so that&#39;s kind of our way of bootstrapping.\n\nDalton Caldwell: I think it&#39;ll just slow you down. The thing is, like, how bootstrapped are you? Like, are you going to run out of money?\n\nShay: Um, we are completely bootstrapped right now.\n\nDalton Caldwell: I see. Yeah, and uh, right now they&#39;re paying us two thousand per month for processing their receipts. This is on track to scale up to fifteen thousand. And sorry, just like you process the receipts—like, what do you—what are you pulling out of the receipt?\n\nShay: The product data. But like, why do they—why are they giving you—that&#39;s like a lot of money for an app developer to give you. Like, why are they? What is the thing that they can&#39;t build themselves that you can build? It&#39;s like super useful to them.\n\nDalton Caldwell: So the thing that we got is that we built um a bunch of scrapers, and we&#39;ve got some um partnerships in in work.\n\nShay: So are they—email? Are you scraping their email? Are you going to like, what are you scraping exactly?\n\nDalton Caldwell: We&#39;re scraping um receipt images. So like, people take the user physical receipts, photograph a physical receipt, and—\n\nKevin Hale: Then the app developer calls your API, passes it like a GIF, and then like you OCR it and you&#39;re like, okay, this is what this thing says. Yep, exactly. Structure it for them.\n\nDalton Caldwell: Um, okay, so that it&#39;s not just the receipts, but the discounts too. Do loyalty. Okay, so I&#39;m just making sure I really understand exactly what your API does.\n\nAudience Member: Okay, yes. You get it?\n\nKevin Hale: Yeah, I do get it. Just makes me nervous because what if your real customer is a CPG? It&#39;s like, what&#39;s your real business model? Like, how much data do you need to collect for Kraft to say, like, we even look at this? So I know it&#39;s got to be a lot.\n\nAudience Member: Yes, they want a million receipts a month.\n\nKevin Hale: Gotcha. So all the mobile app developers that potentially need this—how much? That much? Because I feel like the people mostly going to track receipts are going to be people who are tracking expenses. It&#39;s the only app I use that I take a picture of my receipt. Nothing consumer related do I do that. And there&#39;s loyalty stuff, but going along this line of thinking, so if your real customer is a CPG and this is sort of—everyone can extrapolate from this in the audience—but like maybe you should just be building the receipt tracking app that does loyalty. Like, it seems like you&#39;re trying to use this API thing as like a shortcut, and like it&#39;s going to be hard, but you&#39;re like, \&quot;Well, we don&#39;t really know how to get a million receipts, so let&#39;s just build an API.\&quot; Well, and like other people will get receipts, and like that kind of sounds like wishful thinking. Unless—and again, it&#39;s great that you have this first customer, so you know, congrats on that—but like to get a million receipts, do they have a million receipts? So they&#39;re on track?\n\nAudience Member: So they want us to do about half a million receipts right now. So they&#39;re getting us close. Um, but I—and so we&#39;ll need to work with a couple others. Um, they&#39;re actually processing that many. They&#39;re getting that many. And so that&#39;s—that&#39;s the one of the reasons.\n\nKevin Hale: Okay, along this line of thinking, like—and they&#39;re cool with us, right? Because sometimes what&#39;s tough with an API company is if you&#39;re doing something and that it&#39;s really straightforward how you&#39;re monetizing it, the people—like you&#39;re kind of a middleman. And like eventually people like to squeeze out middleman, right? And so maybe they&#39;re like, \&quot;Hey, this is really valuable.\&quot; Maybe the app that you&#39;re selling API to also wants to sell us to CPGs. You know, you see the tension there?\n\nAudience Member: Yeah, yeah, yeah. We see that. And actually, we&#39;ve done research and um, CPGs are buying lots of data from third party companies like Oracle, DataLogix, Experian, and they&#39;re spending millions of dollars to get this type of data. And what&#39;s interesting is that this data is more aggregated in nature. It&#39;s mostly transactional. And what we are getting at is like product level data that we are focusing on, which we know like brands really want.\n\nKevin Hale: So that makes sense. Um, but I think just from a scale perspective, like my understanding of what data brokers want for ad targeting is like tens of millions or hundreds—like the scale that you need to build a data business—is much larger. Um, like have you seen anyone, even with millions? Like, maybe for millions they give you? So the closest ones I&#39;ve seen, the people doing this, is like they&#39;re offering companies for free. So grocery stores, electronic stores, retailers—basically for free e-receipts. They say, \&quot;Like, we offer this technology, e-receipts for free.\&quot; And then what they do is they take all the data, and what they have is like, it&#39;s good for those customers. It&#39;s good for the retailers because they&#39;re getting information they wouldn&#39;t have otherwise about their customer base. And then they resell the data as a data platform to the CPG and like even bigger retailers. And so the whole thing is race to the  man, dude, that really—like, usually to pattern match here, usually you have to stair-step up. And you start with smaller customers that say yes more quickly, and it&#39;s for smaller dollar amounts. And you have to do that for quite a while before you&#39;re able to get one of these, uh, deals. You can—sometimes people call them \&quot;Silver Bullet\&quot; deals, you know? It&#39;s like the deal that makes your startup where you go from zero revenue to a million somehow. The universe makes those very—those things rarely happen. And so I think in your case, what—one negotiation tactic here maybe is to be like, \&quot;Hey, like, we don&#39;t have a million receipts, but why don&#39;t we start with a pilot? We do have whatever—half a million. How about that? Let&#39;s start with that. And like, let&#39;s just get this going. And let&#39;s do our first data drop. And let&#39;s get this on paper.\&quot; And what you can do when you negotiate with these kinds of people is to try to—if they&#39;re saying, \&quot;Come back with this really hard thing, and then maybe I&#39;ll say yes,\&quot; get them to move down to something you can do, something that&#39;s more minor. And then try to get it in writing. And once you get something in writing, it&#39;s so much more likely they&#39;ll do the deal because talk is cheap, man. Like, anyone could say, \&quot;Oh, we&#39;ll give you a million dollars if you do whatever.\&quot; But to get someone that works at a corporation to put something on paper—they&#39;re either inclined to give an excuse why they can&#39;t, or they&#39;re actually serious. And think about how much better that would be for you as founders if you had something in writing because then you know this is real. And that can give you so much more confidence that you&#39;re going down the right direction. So that&#39;s always something I would suggest. This goes for everybody: that you&#39;re dealing with these big organizations, say, try to get anything in writing.\ ons with all these great sounding deals. And we&#39;re like, \&quot;Well, can you get it into writing?\&quot; And they&#39;re like—then they go try to get it into writing, and they&#39;re like, \&quot;Nope.\&quot;\n\nKevin Hale: So that&#39;s such a good test at this stage. And it doesn&#39;t cost you anything.\n\nDalton Caldwell: Absolutely, yeah. The other piece of advice is everything Don talked about in terms of like what you have in the bank in terms of what you&#39;re good at—another way of thinking about it is that like that is the default for your business. The default is the technology. The OCR has to work. It has to work better than anything else. You have to do this. Other thing—usually a startup that is going to actually determine whether you&#39;ll grow and be really successful—and that is going to be sales. And so that is the part you have to work 10x harder on. So this thing that—\n\nDalton Caldwell: You&#39;re not very good at it. You actually have to spend, ironically, a lot more time on it to make your company better. And so yes, for the sales, it&#39;s like you&#39;re going to talk to all the rest of those mobile developers, try to get them all in discussion and close them to get the deal. But also you&#39;ve got Craft going on, but also you should talk to as many other CPG companies. Also, well, the question is: is there a market beyond these guys? Is it similar sort of pricing? What do I need to understand? What needs to be delivered? Because I&#39;m actually, you know, basing everything that I&#39;m going to give to CPG companies on what Craft has said. So it&#39;s really like by the end of the next like two months, it should be like you&#39;ve talked to and figured out how to talk to all the other mobile developers and you&#39;ve talked to like 50 other CPG companies at the very least. And that&#39;s almost all your time. It&#39;s almost no programming or coding. It&#39;s just developing the language for like: do I understand what is the proce ey, then like sex, and then like power or influence, right?\n\nAudience Member: Well, I, it&#39;s only three.\n\nKevin Hale: Um, and so that, so that, so that influence is like the biggest thing. So like, does your platform allow people to get really popular? They generate stuff that lots of people want to see. And until you like hit that, the thing&#39;s dead in the water. So this really it&#39;s like what do I do to bring and on board the very best storytellers, the very best people? And ideally, it&#39;s like you guys are constantly generating these stories and they have to be really, really great. But also it&#39;s like, hopefully your community&#39;s doing stuff and then are you able to promote them better than they can even promote themselves? Like something has to happen there. And that&#39;s like your only goal. Like you can try to monetize, et cetera, but I think it really comes down to like, is this a platform where it&#39;s like, if I use this, it&#39;s like, or I want to tell stories on here because people actually read or experience them? It&#39;s like similar to what you saw for like Medium. The whole thing is, like, what do you do next? I don&#39;t know. That becomes a really hard part. Sometimes you end up raising a bunch of money and it doesn&#39;t work out. But the whole thing is, you have to at least get to the point where like it&#39;s a platform that like gets people really popular. So everything has to do with like looking at what is somewhat popular and saying like, how do I multiply that? How do I replicate that? Is there a viral portion of that where people see those and they start making for themselves? So it&#39;s like I would go and just figure out like how do I get like, let me see here. Best story I heard from within the YC community was like Twitch. Like, basically, they launched a streaming platform, and what they tried to do was like, some people who were already streaming gaming on YouTube, and they contact all the top streamers on there and said like, what do we have to do to get you to come to our platform? And then, and they did whatever they wanted, like because they knew that like if it&#39;s a power law curve for content, right? So only a handful of people are going to be the most popular. And so like that gives you the best head start. And so they built whatever features they like, super nice them, et cetera. And so where are the very best storytellers for your sort of format? And I would think it&#39;s like creative people who have been really good at Snapchat or Instagram or whatever. And say like, look, you want more than this? We can offer this to you. And you have to figure out what do they most want and then build those sort of features.\n\nAudience Member: Have you started doing that?\n\nKevin Hale: Yes, so the last while we&#39;ve been, we know a lot of top creators and that are a top creator. So someone who has 10,000, 50,000, 100,000. I want you to go find people that are like the top ones. You have to talk to them and figure out what would it actually take. So like the best on the author is the million followers plus. Could you get, could you start pulling people pull off Tumblr? Because Tumblr&#39;s, that&#39;s actually most of our traffic. So when, when we say social, our traffic like 80%, like Tumblr, Yahoo is not really taken care of, and I imagine you can pull like the top Tumblr people, right?\n\nAudience Member: Yep. So we&#39;re actually, so we actually are friends with almost all the top Tumblr creators. Um, what we&#39;ve been thinking about is critical mass, and we think that there&#39;s a certain point, like we want to spike everything with all the users coming together at once where you hit this critical mass point, and theoretically, you know, supply demand.\n\nKevin Hale: I would not even think of it like that. That&#39;s like too complicated. It&#39;s mostly it&#39;s just like all the popular kids and I&#39;m just going to systematically talk to all, land grab, get as many, many as you can. And because what you&#39;re looking for, it&#39;s inspiration. And you don&#39;t know what it&#39;s going to be. You don&#39;t know who is going to be the one that like makes the platform take off. You don&#39;t know what is the piece that they&#39;re going to make. So you need just a lot of lightning striking that. So hopefully like people go like, holy crap, what&#39;s this new platform?\n\nAudience Member: I agree with that. I mean, like, look, I think that founders that are working on consumer internet stuff undercount how many social things get to your scale and then top out. Like they think everyone knows the story of Snapchat and Facebook. And they know about things like that. But man, even back in the day, there were a lot of Facebook competitors, like hundreds. And a lot of them had millions of users, right? Tens of millions of users. And that&#39;s not meaningful. And it, the problem, the thing that&#39;s tricky about consumer internet, if you&#39;re not going to monetize, you know, by charging your users, is the only way you can ever build an ad business is you need hundreds of millions. And so I think in your, like, think about Tumblr itself. Um, they had trouble with their ad business. But remember, they were the winner. For every Tumblr, there were like 10 other little blog sites. Which, it sounds like you guys are experts, so you remember them, right? There were other like wannabe Tumblers that had decent, you know, even LiveJournal itself, LiveJournal was the original Tumblr. But like that, so the point I&#39;m making is, I agree with Kevin. If you&#39;re going to do this kind of business, you usually want it to grow as fast as you can and get those economies of scale. Otherwise, you can get stuck in the... to million user range, and then top out, and then then what? Like those are like the, I know the founders of a lot of those types of ones, and those are rough, right?\n\nAudience Member: I feel like you want both a bunch of users and then a bunch of different stories. Like I think, again, be PR. Like what are the top things that people have done on Tumblr, recreating it on your platform? What, like, top tweet storms, right? That&#39;s like series of like small pieces of text and then to tell them on your platform. And as for his Twitch thing, just tell, ask them, what would it take for you to move everything over from Tumblr? Like, what features do we need to build for you to take everything from your Tumblr over here? And then put up a audios Tumblr blog post and then like point to your site. And then if you just did that systematically, that was the Twitch Playbook.\n\nKevin Hale: Cool. Um, I think that would work. I don&#39;t think. I think, I think, now is the time to raid the, uh, the Tumblr users.\n\nAudience Member: Yeah. Um, one of the most popular things we have is that it&#39;s a two-directional thing. So people take content from Tumblr and then post it on Comml, and we have an export function. Every social site has a different like preferred format. So on Tumblr, we export as a photo set, so if you&#39;re sharing on Tumblr, it automatically generates a photo set that&#39;s pretty and fits on Tumblr. Facebook is different, Twitter&#39;s different.\n\nKevin Hale: You should also look at all the people making the little stories on Medium too. All of them as well.\n\nAudience Member: We also have edible stories too. So the whole thing is like, figure out, talk to the top storytellers, talk to the top people who are on all those different platforms, figure out what it&#39;s going to take to bring them over or start moving some of the stuff over automatically and just showing it off to your community and seeing like what sticks, what people really like, what goes around. Because like, yeah, consumer is different. Like I think a lot of times, people like out in the audience world, they they hear these consumer things, which is just get big, get big, get big. And that is what we&#39;re telling you. But just for everyone else in the audience that&#39;s not the case. If you&#39;re doing like B2B, and if you&#39;re like, like, this is not like one-size-fits-all uh advice. But like, if you&#39;re going to, hey, you&#39;re launched, you&#39;re doing consumer internet, you have 100,000 MAU. Like, okay, like, you made it this far. You&#39;ve got to, you&#39;ve got to like power through here, or else if you end up stalling out, you&#39;re dead in the water. Then, well, then then what? Like, you&#39;re, you don&#39;t have enough users to really monetize, um, and, and that&#39;s we&#39;ve just seen a lot of people stall out at this stage. So in your case, yeah, you you got to grow.\n\nAudience Member: Yeah, we are in the problem-solving position here.\n\nKevin Hale: Yeah, well, just need, you need to generate whatever it takes to get people. The word of mouth about your thing is like, oh, if I make, if I, if I&#39;m a really good creator, I tell the stories on this platform, I can get really big. And one other piece of tactical advice um, I would look at SEO. Um, usually, like the way you get really huge, I built a consumer site uh, I got it up to 25 million MAU, and um, SEO was a big part of that. And the way you do something like Quora where you get hundreds of millions of MAU is SEO. So I I would try toting helps us get back links and you know, help us rank some of those stories that uh, that normally wouldn&#39;t rank. We&#39;ve almost, yeah, we&#39;re we&#39;re approaching currently right now.\n\nAudience Member: Yeah, okay, good. Because that&#39;s the sort of thing. It doesn&#39;t cost you anything, and that&#39;ll just get the flywheel spinning for you to to hit that escape velocity.\n\nKevin Hale: Five minutes. Any questions for us?\n\nAudience Member: I think the biggest challenge for us obviously is getting from our 100,000 to 10 million, right? Like that&#39;s the next big phase. Um, you&#39;ve already kind of gone over different strategies. I&#39;m curious what other companies that you&#39;ve seen through going through YC who have, you know, successfully gone from that 100,000 to million?\n\nKevin Hale: It&#39;s still power. It&#39;s always power for those kind of communities. So the top ones bring almost all the traffic. Which is why I&#39;m saying like everything you have to do is like, how do I bring on celebrities onto the platform? Or I turn people into celebr...\n\nKevin Hale: And along those lines, here&#39;s the pitfall: don&#39;t pay them, right? Don&#39;t pay them. Sometimes I&#39;ve seen people try that, and that is not—like, paying for traffic when you don&#39;t have revenue is like, they need to love it. And once you pay them, they also expect to be paid every time. You make something that is exactly right, like, right? Like, um, as far as my understanding is, you know, Instagram never paid anyone. Snapchat never paid anyone. All their clones sure did, right? But that&#39;s, you know what I&#39;m saying? Like, YouTube wasn&#39;t really paying for traffic, but all the wannabe YouTubes that were trying to raise money were paying for traffic. So like, whatever you try, don&#39;t just take what he&#39;s saying and be like, \&quot;Yeah, we&#39;re just going to pay some celebrities,\&quot; and you know, right? It&#39;s not a cost-effective way of growing.\n\nDalton Caldwell: Yeah, uh, I think if you have the dev cycles—I don&#39;t know if you do—but I would consider a mobile app. One advantage from a retention perspective is that you can do push notifications, and that way if someone is subscribing to something and you do a push notification to their followers, then you&#39;re ensuring a much more a tighter feedback loop than maybe you have now on mobile web. Definitely, how&#39;s your email? What are you doing with email?\n\nAudience Member: So because they&#39;re teens, email has been pretty tricky in terms of getting high response rates. Um, we tried messenger bots, so we get some decent response rate there. Um, still nothing huge or significant.\n\nKevin Hale: I would keep examining one. Those again, you&#39;re asking what have people done. Um, you have to reach out and touch people for them to not forget your thing exists, like. Think about it: like, there&#39;s a million apps out there. There&#39;s a million—everything is competing for our attention. And if you think about tools like Facebook, it&#39;s basically a weaponized attention grabber, right? They have thousands of people working on making sure that you&#39;re constantly looking back at it, right? Like, very smart people. That&#39;s all they do all day is try to steal your attention. And you&#39;re competing with them, right? For attention.\n\nDalton Caldwell: Exactly.\n\nKevin Hale: Um, so I think just doing some really basic stuff like continuing to iterate on email—if chat is the right thing to do, make sure people remember you exist and that they are a member of your community and that they should go check out some new stories. Um, otherwise it&#39;s going to be tricky. Um, one experiment you could do—I&#39;ve heard someone give a talk before—is go create a Facebook account with like a fake email and don&#39;t add any friends and look at how many emails it sends you.\n\nAudience Member: I done that actually. It sends you like 50. I&#39;m exaggerating, but the point is, they realize that if you don&#39;t add any friends, that you&#39;re going to have a bad time and that you&#39;re useless to them. And so they&#39;re very aggressive about emailing people. Otherwise, they know they know they churned you.\n\nKevin Hale: So anyway, if you have users that you know are gonna churn or on the, you know, way past churning—well, just like remind them that you exist. Um, that&#39;s best practices too.\n\nAudience Member: Make sense. Yeah, guys, thank you so much. Thank you, appreciate it. Best of luck. Thanks.\n\nDalton Caldwell: Okay cool. Well, I think that&#39;s it for us.&quot;,&quot;sl
